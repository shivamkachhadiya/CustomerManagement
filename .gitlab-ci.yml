stages:
  - build
  - test

build-job:
  stage: build
  image: maven:3.9.6-eclipse-temurin-21
  script:
    - echo "Building Customer Management Application..."
    - mvn clean compile -Dmaven.compiler.release=21
  artifacts:
    paths:
      - target/

test-job:
  stage: test
  image: maven:3.9.6-eclipse-temurin-21
  script:
    - echo "Running Unit Tests..."
    - mvn test -Dmaven.compiler.release=21